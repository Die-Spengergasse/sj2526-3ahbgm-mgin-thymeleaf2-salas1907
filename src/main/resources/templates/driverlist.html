<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drivers List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <table class="table">
        <thead>
        <tr>
            <th>name</th>
            <th>team</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${Driver}">
            <td th:text="${d.name}"></td>
            <td th:text="${d.team}"></td>
        </tr>
        </tbody>

    </table>

    <p>
        <a href="/driver/add">new driver</a>
    </p>
</div>
</body>
</html>
