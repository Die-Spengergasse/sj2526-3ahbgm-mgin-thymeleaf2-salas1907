<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Driver List</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #e10600; color: white; }
        a { color: #e10600; margin-right: 8px; }
    </style>
</head>
<body>
<h2>Drivers</h2>
<table>
    <thead>
    <tr><th>Name</th><th>Team</th><th>Actions</th></tr>
    </thead>
    <tbody>
    <tr th:each="d : ${Driver}">
        <td th:text="${d.name}"></td>
        <td th:text="${d.team}"></td>
        <td>
            <a th:href="@{/driver/edit/{id}(id=${d.id})}">Edit</a>
            <a th:href="@{/driver/delete/{id}(id=${d.id})}">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
<br>
<a href="/driver/add">+ Add Driver</a>
</body>
</html>
