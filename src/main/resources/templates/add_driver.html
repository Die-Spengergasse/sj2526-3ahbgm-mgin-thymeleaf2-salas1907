<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Add Driver</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 0 20px; }
        input { display: block; width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; }
        input[type=submit] { background: #e10600; color: white; border: none; cursor: pointer; }
        a { color: #e10600; }
    </style>
</head>
<body>
<h2>Add Driver</h2>
<form th:action="@{/driver/add}" th:object="${Driver}" method="post">
    <input type="text" th:field="*{name}" placeholder="Driver name">
    <input type="text" th:field="*{team}" placeholder="Team name">
    <input type="submit" value="Save">
</form>
<br>
<a href="/driver/list">← Back</a>
</body>
</html>
